<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Candy Li Doces Finos · Admin</title>
    <link rel="stylesheet" href="../../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <header class="admin-bar">
        <span><strong>Dashboard</strong></span>
        <span>
            <a href="../index.html">Orçamentos</a>
            <span style="opacity:0.6"> · </span>
            <a href="../../index.html">Site</a>
        </span>
    </header>

    <div class="admin-wrap">
        <div id="dashboard-storage-aviso" class="admin-card" style="display:none;background:#eef6ff;border:1px solid #90caf9;font-size:0.88rem;line-height:1.5;margin-bottom:1rem"></div>
        <div id="dashboard-login-msg" class="admin-card" hidden>
            <p>Faça login em <a href="../index.html">Orçamentos</a> primeiro.</p>
        </div>

        <div id="dashboard-conteudo" hidden>
            <div class="dashboard-cards" id="dashboard-cards"></div>

            <div class="dashboard-chart">
                <h2>Orçamentos por status</h2>
                <div class="chart-bars" id="chart-bars"></div>
            </div>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/orcamentos-logic.js"></script>
    <script src="../../js/orcamentos-compat.js"></script>
    <script src="../../js/orcamentos-storage.js"></script>
    <script src="../../js/admin-common.js"></script>
    <script>
        (function () {
            var coresBarra = {
                novo_orcamento: "#9e9e9e",
                degustacao_agendada: "#1976d2",
                degustacao_realizada: "#7b1fa2",
                desconto_aplicado: "#f57c00",
                contrato_gerado: "#f9a825",
                fechado: "#388e3c",
                perdido: "#c62828"
            };

            function fmt(n) {
                return formatarMoeda(n);
            }

            function render() {
                if (!adminEstaAutenticado()) {
                    document.getElementById("dashboard-login-msg").hidden = false;
                    return;
                }
                var av = document.getElementById("dashboard-storage-aviso");
                if (av && (location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
                    av.style.display = "block";
                    av.textContent = location.protocol === "file:"
                        ? "Use http://localhost (npx serve) para o site e o admin — file:// não compartilha orçamentos com esta página."
                        : "Use o mesmo host (só localhost ou só 127.0.0.1) no cardápio e aqui; cada um guarda dados separados.";
                }
                document.getElementById("dashboard-conteudo").hidden = false;
                var lista = listarOrcamentos();
                var total = lista.length;

                var emDeg = 0;
                var aprovados = 0;
                var fechados = 0;
                var perdidos = 0;
                var valorPropostas = 0;
                var valorFechado = 0;
                var porStatus = {};

                lista.forEach(function (o) {
                    var k = statusNormalizado(o);
                    porStatus[k] = (porStatus[k] || 0) + 1;
                    if (k === "degustacao_agendada" || k === "degustacao_realizada") emDeg++;
                    if (k === "desconto_aplicado" || k === "contrato_gerado") aprovados++;
                    if (k === "fechado") fechados++;
                    if (k === "perdido") perdidos++;
                    var vf = valorFinalOrc(o);
                    if (k !== "perdido" && k !== "fechado") valorPropostas += vf;
                    if (k === "fechado") valorFechado += vf;
                });

                var cards = document.getElementById("dashboard-cards");
                cards.innerHTML =
                    cardHtml("Total de orçamentos", String(total)) +
                    cardHtml("Em degustação", String(emDeg)) +
                    cardHtml("Aprovados (pós-degust.)", String(aprovados)) +
                    cardHtml("Fechados", String(fechados)) +
                    cardHtml("Perdidos", String(perdidos)) +
                    cardHtml("Valor em propostas abertas", fmt(valorPropostas)) +
                    cardHtml("Valor total fechado", fmt(valorFechado));

                var keys = Object.keys(CONFIG.STATUS_LABELS || {});
                var maxC = Math.max.apply(null, keys.map(function (key) {
                    return porStatus[key] || 0;
                }).concat([1]));

                var chart = document.getElementById("chart-bars");
                chart.innerHTML = "";
                keys.forEach(function (key) {
                    var n = porStatus[key] || 0;
                    var pct = Math.round((n / maxC) * 100);
                    var row = document.createElement("div");
                    row.className = "chart-row";
                    row.innerHTML =
                        "<span class=\"rotulo\">" + escapeHtml(CONFIG.STATUS_LABELS[key]) + "</span>" +
                        "<div class=\"bar-wrap\"><div class=\"bar-fill\" style=\"width:" + pct + "%;background:" + (coresBarra[key] || "#999") + "\"></div></div>" +
                        "<span class=\"num\">" + n + "</span>";
                    chart.appendChild(row);
                });
            }

            function cardHtml(titulo, valor) {
                return "<div class=\"dashboard-card\"><h3>" + escapeHtml(titulo) + "</h3><div class=\"valor\">" + escapeHtml(valor) + "</div></div>";
            }

            function escapeHtml(s) {
                var d = document.createElement("div");
                d.textContent = String(s);
                return d.innerHTML;
            }

            window.addEventListener("storage", function (ev) {
                if (!ev.key || (ev.key !== "orcamentos" && ev.key.indexOf("orcamentos_") !== 0)) return;
                if (adminEstaAutenticado()) render();
            });

            document.addEventListener("DOMContentLoaded", render);
        })();
    </script>
</body>
</html>
